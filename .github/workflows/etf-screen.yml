name: ETF screen every two hours

on:
  workflow_dispatch:
    inputs:
      test_discord:
        description: "Send a Discord test message even if no criteria are met"
        required: false
        type: boolean
        default: false

  schedule:
    # Run every two hours, Monday through Friday.
    # GitHub scheduled cron runs in UTC, but the exact local hour
    # no longer matters because the screener runs throughout the day.
    - cron: "0 */2 * * 1-5"

permissions:
  contents: read

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETF screener
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TEST_DISCORD: ${{ inputs.test_discord || 'false' }}
        run: python etf_screener.py
